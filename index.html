<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Product Reseller System</title>
    <style>
        :root { --primary-color: #075e54; --accent-color: #25d366; --gold: #ffd700; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; padding: 10px; text-align: center; color: #333; }
        .container { max-width: 600px; margin: auto; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 20px; }
        .header { background: var(--primary-color); color: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        
        /* Product Cards */
        .product-grid { display: grid; gap: 15px; margin-bottom: 20px; }
        .product-card { border: 2px solid #eef0f2; border-radius: 15px; padding: 15px; transition: 0.3s; position: relative; }
        .product-card.reseller { border-color: var(--gold); background: #fffdf0; }
        .price-badge { font-size: 24px; font-weight: bold; color: var(--primary-color); display: block; margin: 10px 0; }
        
        /* Buttons */
        .btn { border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; transition: 0.3s; margin-top: 10px; }
        .btn-buy { background: var(--primary-color); color: white; }
        .btn-sale { background: #ff9800; color: white; display: none; } 
        
        /* Payment Section */
        #payment-modal, #register-section { display: none; margin-top: 20px; padding: 20px; border-top: 2px solid #eee; background: #f9f9f9; border-radius: 10px; }
        .account-box { background: #dcf8c6; padding: 15px; border-radius: 10px; margin: 15px 0; border: 1px solid #c5e1a5; }
        .acc-number { font-size: 22px; font-weight: bold; color: #128c7e; letter-spacing: 1px; }

        /* Form Styling */
        .form-input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; text-align: right; }
        .reg-header { color: var(--primary-color); font-weight: bold; margin-bottom: 10px; }

        .loading { color: #666; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Digital Store (Old System)</h2>
        <p id="status-msg" class="loading">Checking System Status...</p>
    </div>

    <div class="product-grid">
        <div class="product-card">
            <h3>Basic Canva Bundle</h3>
            <span class="price-badge">Rs. 200</span>
            <button class="btn btn-buy" onclick="openPayment(200)">Buy Now</button>
            <button class="btn btn-sale" id="sale-btn-200" onclick="openResellerForm()">Sale & Share</button>
        </div>

        <div class="product-card">
            <h3>Marketing Guide</h3>
            <span class="price-badge">Rs. 300</span>
            <button class="btn btn-buy" onclick="openPayment(300)">Buy Now</button>
            <button class="btn btn-sale" id="sale-btn-300" onclick="openResellerForm()">Sale & Share</button>
        </div>

        <div class="product-card reseller">
            <h3>Master Reseller Rights</h3>
            <span class="price-badge">Rs. 500</span>
            <button class="btn btn-buy" onclick="openPayment(500)">Buy Now</button>
            <button class="btn btn-sale" id="sale-btn-500" onclick="openResellerForm()">Sale & Share</button>
        </div>
    </div>

    <div id="payment-modal">
        <h4 id="payment-title">Payment Details</h4>
        <div class="account-box">
            <p><strong>Account Title:</strong> <span id="display-title">---</span></p>
            <p><strong>Account Number:</strong><br> <span class="acc-number" id="display-num">---</span></p>
        </div>
        <button class="btn" style="background:#007bff; color:white;" onclick="showReg()">I Have Paid - Register Now</button>
    </div>

    <div id="register-section">
        <div class="reg-header">Apni Details Bharein (Registration)</div>
        <p style="font-size: 12px; color: #666;">Ye information aapka link generate karne ke liye hai.</p>
        <input type="text" id="reg-name" class="form-input" placeholder="Apka Mukammal Naam">
        <input type="text" id="reg-title" class="form-input" placeholder="Account Title (e.g. Ali Khan)">
        <input type="text" id="reg-num" class="form-input" placeholder="EasyPaisa No (bin 0 ke, e.g. 3001234567)">
        <input type="text" id="reg-trx" class="form-input" placeholder="Transaction ID (Trx ID)">
        <button class="btn" style="background:var(--accent-color); color:white;" onclick="autoRegister()">Submit to Admin</button>
    </div>
</div>

<script>
    const sheetID = "1xGSilGQE31f50oGFsPhvJHkteVBDtDqREFY3bmbFSgI";
    const scriptURL = "YAHAN_APNA_APPS_SCRIPT_URL_LAGAYEN"; // 01. Apna Apps Script URL yahan lagayen
    const base = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;

    const urlParams = new URLSearchParams(window.location.search);
    const sellerID = urlParams.get('s') || "admin"; 
    const currentUserID = localStorage.getItem('user_id') || ""; 

    async function initSystem() {
        try {
            const res = await fetch(base);
            const text = await res.text();
            const json = JSON.parse(text.substr(47).slice(0, -2));
            const rows = json.table.rows;

            let activeSeller = null;
            let currentUserStatus = "Guest";

            rows.forEach(row => {
                const sID = row.c[0] ? row.c[0].v : ""; 
                const accTitle = row.c[2] ? row.c[2].v : ""; 
                const accNum = row.c[3] ? row.c[3].v : ""; 
                const status = row.c[4] ? row.c[4].v : ""; 

                if (sID == sellerID) {
                    activeSeller = { title: accTitle, num: "0" + accNum }; 
                }
                if (sID == currentUserID && status == "Approved") {
                    currentUserStatus = "Approved";
                }
            });

            updateUI(activeSeller, currentUserStatus);
        } catch (e) { document.getElementById('status-msg').innerText = "Connection Error"; }
    }

    function updateUI(seller, status) {
        document.getElementById('status-msg').innerText = "System Active";
        if (status === "Approved") {
            document.querySelectorAll('.btn-buy').forEach(b => b.style.display = 'none');
            document.querySelectorAll('.btn-sale').forEach(b => b.style.display = 'block');
            document.getElementById('status-msg').innerText = "Welcome Back, Seller!";
        }
        if (seller) {
            document.getElementById('display-title').innerText = seller.title;
            document.getElementById('display-num').innerText = seller.num;
        }
    }

    function openPayment(price) {
        document.getElementById('payment-modal').style.display = 'block';
        document.getElementById('register-section').style.display = 'none';
        window.scrollTo(0, document.body.scrollHeight);
    }

    function showReg() {
        document.getElementById('register-section').style.display = 'block';
        window.scrollTo(0, document.body.scrollHeight);
    }

    async function autoRegister() {
        const uID = "user_" + Math.floor(Math.random() * 10000);
        const data = {
            id: uID,
            name: document.getElementById('reg-name').value,
            title: document.getElementById('reg-title').value,
            number: document.getElementById('reg-num').value,
            trx: document.getElementById('reg-trx').value
        };

        if(!data.name || !data.number) { alert("Please fill all fields"); return; }

        // Data sheet mein bhejna
        try {
            await fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(data)
            });
            localStorage.setItem('user_id', uID);
            alert("Application Sent! Admin approval ke baad aapka 'Sale' button on ho jayega. ID: " + uID);
            location.reload();
        } catch (e) { alert("Error sending data"); }
    }

    function openResellerForm() {
        alert("Approved! Apna link copy karein:\n" + window.location.origin + window.location.pathname + "?s=" + currentUserID);
    }

    initSystem();
</script>

</body>
</html>
